<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Better Deal - เปรียบเทียบราคา</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="favicon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Better Deal">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* Keep number inputs without arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .best-deal-highlight {
            border-color: #10B981 !important;
            /* Emerald 500 */
            background-color: #f2fdf4 !important;
            /* light emerald */
        }

        .dark .best-deal-highlight {
            border-color: #059669 !important;
            /* Emerald 600 */
            background-color: #064e3b !important;
            /* dark emerald */
        }
    </style>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body
    class="bg-gray-50 dark:bg-gray-900 min-h-screen font-sans text-gray-900 dark:text-gray-100 antialiased transition-colors duration-300">

    <button id="theme-toggle"
        class="fixed top-4 right-4 z-50 p-1.5 bg-white dark:bg-gray-800 rounded-full shadow-sm border border-gray-200 dark:border-gray-700 text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <svg id="theme-icon-dark" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
        </svg>
        <svg id="theme-icon-light" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
        </svg>
    </button>

    <main class="max-w-xl mx-auto px-2 py-6 pb-24 flex flex-col min-h-screen">

        <!-- Column Headers -->
        <div class="grid grid-cols-[auto_1fr_1fr_auto] gap-x-2 px-3 w-full mb-2 mt-4">
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest w-6 text-center text-center">No.
            </div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">ราคา (฿)</div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">ปริมาณ</div>
            <div class="w-6"></div> <!-- Spacer for delete button -->
        </div>

        <div id="items-container" class="space-y-2 flex-grow mb-6">
            <!-- Item 1 -->
            <div class="item-card bg-white dark:bg-gray-800 border-2 border-transparent shadow-sm rounded-xl p-2 transition-all duration-300 relative group"
                data-id="1">
                <div class="grid grid-cols-[auto_1fr_1fr_auto] gap-x-2 items-center">
                    <div class="w-6 text-center">
                        <span
                            class="text-xs font-bold text-gray-500 item-number bg-gray-100 dark:bg-gray-700 w-6 h-6 inline-flex items-center justify-center rounded-full">1</span>
                    </div>
                    <div>
                        <input type="number" min="0" step="0.01"
                            class="price-input w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg px-2 py-1.5 text-sm transition-colors placeholder:text-gray-400"
                            placeholder="0.00">
                    </div>
                    <div>
                        <input type="number" min="0" step="0.01"
                            class="amount-input w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg px-2 py-1.5 text-sm transition-colors placeholder:text-gray-400"
                            placeholder="1.00">
                    </div>
                    <div class="w-6 flex justify-center items-center">
                        <!-- empty space for item 1 delete btn -->
                    </div>
                </div>
                <div class="flex justify-between items-center mt-1.5 pl-[2.25rem] pr-1">
                    <div class="unit-price-display text-[10px] text-gray-500 dark:text-gray-400 font-medium">
                        <span class="font-bold text-gray-800 dark:text-gray-200 text-xs">-</span>
                    </div>
                    <div
                        class="winner-badge hidden text-[10px] font-bold text-emerald-700 dark:text-emerald-300 bg-emerald-100 dark:bg-emerald-900/40 px-2 py-0.5 rounded-full shadow-sm flex items-center gap-1">
                        ✨ คุ้มที่สุด
                    </div>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="item-card bg-white dark:bg-gray-800 border-2 border-transparent shadow-sm rounded-xl p-2 transition-all duration-300 relative group"
                data-id="2">
                <div class="grid grid-cols-[auto_1fr_1fr_auto] gap-x-2 items-center">
                    <div class="w-6 text-center">
                        <span
                            class="text-xs font-bold text-gray-500 item-number bg-gray-100 dark:bg-gray-700 w-6 h-6 inline-flex items-center justify-center rounded-full">2</span>
                    </div>
                    <div>
                        <input type="number" min="0" step="0.01"
                            class="price-input w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg px-2 py-1.5 text-sm transition-colors placeholder:text-gray-400"
                            placeholder="0.00">
                    </div>
                    <div>
                        <input type="number" min="0" step="0.01"
                            class="amount-input w-full bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg px-2 py-1.5 text-sm transition-colors placeholder:text-gray-400"
                            placeholder="1.00">
                    </div>
                    <div class="w-6 flex justify-center items-center">
                        <!-- empty space for item 2 delete btn -->
                    </div>
                </div>
                <div class="flex justify-between items-center mt-1.5 pl-[2.25rem] pr-1">
                    <div class="unit-price-display text-[10px] text-gray-500 dark:text-gray-400 font-medium">
                        <span class="font-bold text-gray-800 dark:text-gray-200 text-xs">-</span>
                    </div>
                    <div
                        class="winner-badge hidden text-[10px] font-bold text-emerald-700 dark:text-emerald-300 bg-emerald-100 dark:bg-emerald-900/40 px-2 py-0.5 rounded-full shadow-sm flex items-center gap-1">
                        ✨ คุ้มที่สุด
                    </div>
                </div>
            </div>
        </div>

        <div
            class="fixed bottom-0 left-0 w-full bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-100 dark:border-gray-800 p-3 pb-safe z-50">
            <div class="max-w-xl mx-auto flex gap-3 items-center">
                <button id="add-btn"
                    class="flex-1 flex items-center justify-center gap-1.5 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 font-bold py-3 rounded-xl border border-indigo-100 dark:border-indigo-800 hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors shadow-sm focus:outline-none active:scale-95 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    เพิ่มรายการ
                </button>
                <button id="clear-btn"
                    class="flex-1 flex items-center justify-center gap-1.5 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-bold py-3 rounded-xl border border-red-100 dark:border-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors shadow-sm focus:outline-none active:scale-95 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    ล้างข้อมูล
                </button>
            </div>
        </div>

    </main>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => { });
            });
        }
    </script>
    <script src="script.js"></script>
</body>

</html>
